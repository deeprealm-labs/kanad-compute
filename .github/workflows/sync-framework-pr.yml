name: Sync framework (auto-PR on push)

# Listens for repository_dispatch 'kanad-framework-updated' events from
# deeprealm-labs/kanad. On receipt, fetches the framework at the new SHA,
# vendors it into kanad_compute/kanad/, and opens a PR for review.
#
# Tag releases (publish.yml) still go to PyPI on tag push.
# This workflow keeps the dev branch always-current with a human review gate.

on:
  repository_dispatch:
    types: [kanad-framework-updated]
  workflow_dispatch:
    inputs:
      framework_sha:
        description: 'kanad framework SHA to pin (default: main HEAD)'
        required: false
        default: 'main'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout kanad-compute
        uses: actions/checkout@v4

      - name: Resolve framework ref
        id: ref
        run: |
          SHA="${{ github.event.client_payload.framework_sha || github.event.inputs.framework_sha || 'main' }}"
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          MSG=$(echo "${{ github.event.client_payload.commit_message }}" | head -1)
          echo "msg=$MSG" >> $GITHUB_OUTPUT

      - name: Clone kanad framework at SHA
        uses: actions/checkout@v4
        with:
          repository: deeprealm-labs/kanad
          ref: ${{ steps.ref.outputs.sha }}
          path: kanad-framework

      - name: Bundle framework into kanad_compute/kanad
        run: |
          bash scripts/bundle_kanad.sh kanad-framework
          # Record pinned SHA so reviewers see exactly what landed
          mkdir -p .framework
          echo "${{ steps.ref.outputs.sha }}" > .framework/pinned-sha
          echo "Source: deeprealm-labs/kanad" > .framework/pinned-source
          echo "Updated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> .framework/pinned-source

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: framework-sync/${{ steps.ref.outputs.sha }}
          base: main
          commit-message: |
            chore(framework): sync to ${{ steps.ref.outputs.sha }}

            From deeprealm-labs/kanad@${{ steps.ref.outputs.sha }}
            Upstream message: ${{ steps.ref.outputs.msg }}
          title: "Sync kanad framework -> ${{ steps.ref.outputs.sha }}"
          body: |
            Auto-generated by `sync-framework-pr.yml` in response to a push on
            deeprealm-labs/kanad@main.

            **Framework SHA:** `${{ steps.ref.outputs.sha }}`
            **Upstream commit message:**
            ```
            ${{ github.event.client_payload.commit_message }}
            ```

            ## Review checklist
            - [ ] CI passes
            - [ ] No surprising deletions in `kanad_compute/kanad/` diff
            - [ ] No security-relevant additions (new external imports, file IO, network calls)
            - [ ] Compatible with current `kanad-compute` API expectations

            Once merged, the next `v*` tag will publish this framework version to PyPI.
          labels: |
            framework-sync
            automated
          delete-branch: true
