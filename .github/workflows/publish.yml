name: Build & Publish to PyPI

# Triggers PyPI release on tag push (v*).
# Source of framework: deeprealm-labs/kanad@main (same org now, no cross-account token).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kanad-compute
        uses: actions/checkout@v4

      - name: Clone kanad framework (private repo — needs PAT)
        uses: actions/checkout@v4
        with:
          repository: deeprealm-labs/kanad
          ref: main
          path: kanad-framework
          token: ${{ secrets.KANAD_DISPATCH_PAT }}

      - name: Verify framework checkout
        run: |
          test -f kanad-framework/__init__.py || \
            (echo "ERROR: kanad-framework/__init__.py missing"; exit 1)
          echo "Framework checked out OK"
          ls kanad-framework/ | head -10

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools wheel

      - name: Bundle kanad framework
        run: |
          bash scripts/bundle_kanad.sh kanad-framework
          echo "Bundled $(find kanad_compute/kanad -name '*.py' | wc -l) kanad modules"

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
