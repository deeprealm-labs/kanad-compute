name: Build & Publish to PyPI

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags: v0.1.0, v0.2.0, etc.
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kanad-compute
        uses: actions/checkout@v4

      - name: Checkout kanad framework (private)
        uses: actions/checkout@v4
        with:
          repository: deeprealm-labs/kanad-app
          path: kanad-app
          token: ${{ secrets.KANAD_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools wheel

      - name: Bundle kanad framework
        run: |
          bash scripts/bundle_kanad.sh kanad-app/kanad
          echo "Bundled $(find kanad_compute/kanad -name '*.py' | wc -l) kanad modules"

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
