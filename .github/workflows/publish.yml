name: Build & Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kanad-compute
        uses: actions/checkout@v4

      - name: Clone kanad framework
        run: |
          git clone --depth 1 --branch live-minimal \
            https://x-access-token:${{ secrets.KANAD_REPO_TOKEN }}@github.com/mk0dz/kanad-app.git \
            kanad-app
          echo "Cloned kanad-app, kanad/ contents:"
          ls kanad-app/kanad/__init__.py && echo "OK"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools wheel

      - name: Bundle kanad framework
        run: |
          bash scripts/bundle_kanad.sh kanad-app/kanad
          echo "Bundled $(find kanad_compute/kanad -name '*.py' | wc -l) kanad modules"

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
