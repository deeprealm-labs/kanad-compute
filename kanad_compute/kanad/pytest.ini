[pytest]
testpaths = tests
markers =
    deprecated: tests for features marked deprecated in the framework's own metadata
    orphaned: tests for modules with zero inbound imports
    slow: tests > 30 seconds
    hardware: tests that require real quantum hardware credentials
    nightly: tests run only in nightly CI
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
